# Test configuration — overrides main application.properties during tests
# Uses H2 in-memory database instead of PostgreSQL — no real DB needed

# H2 In-Memory Database (auto-created, auto-destroyed per test run)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — auto-create tables from entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# JWT test values
jwt.secret=test-secret-key-for-vivaathi-dms-system-2024-secure
jwt.expiration=3600000

# Suppress banner and reduce noise in test output
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.dms=INFO
